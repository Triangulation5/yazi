# SECTION SEPARATORS
# These separate entire statusline sections (e.g. lualine_a, lualine_b, etc.)
#
#  Left   | Right  | Style                     | Notes
# --------|--------|---------------------------|--------------------------------------------------
#   Óāį     |  Óā≤     | Powerline Classic         | Most commonly used, sharp angles
#   Óāī     |  Óā∂     | Powerline Soft            | Smoother, rounded; good for soft themes
#   ÓÉÜ     |  ÓÉá     | Wave                      | Curved and elegant
#   ÓÉą     |  ÓÉä     | Powerline Arrows (alt)    | Heavier version, similar shape
#   ÓÉí     |  ÓÉĒ     | Half-height               | Compressed spacing for subtle look
#   ‚Ėą     |  ‚Ėą     | Blocky Full Height        | Very bold ‚ÄĒ only works well with opaque backgrounds
#   ÔĀď     |  ÔĀĒ     | Nerd Font Angles          | Clean, modern angled brackets (nf-fa-angle_*)
#   ÔĄĄ     |  ÔĄÖ     | Nerd Font Chevrons        | Sharp directional chevrons (nf-oct-chevron_*)
#   ÔĄÄ     |  ÔĄĀ     | Nerd Font Triangles       | Solid triangular pointers (nf-oct-triangle_*)
#   ‚Ė∂     |  ‚óÄ     | Triangle Simple           | Clean, geometric ASCII fallback
#   ¬Ľ     |  ¬ę     | Double Arrow              | Sharp, minimalist
#   ‚Ė∑     |  ‚óĀ     | Hollow Triangle           | Lighter variation
#   ‚ü©     |  ‚ü®     | Angle Brackets            | Minimal and symmetrical
#   ‚Üí     |  ‚Üź     | Simple Arrows             | Basic, universal
#         |        | None                      | Flat style ‚ÄĒ no visual break
#   ‚ĒÄ     |  ‚ĒÄ     | Flat Dash                 | Neutral divider
#   ¬∑     |  ¬∑     | Dot Minimal               | For extremely minimal UI
#
#
# COMPONENT SEPARATORS
# These separate components *within* a section (like `filetype | filename`)
#
#  Left   | Right  | Style                    | Notes
# --------|--------|--------------------------|--------------------------------------------------
#   ÓāĪ     |  Óā≥     | Powerline Thin Slash     | Default for many setups
#   ÓāĶ     |  Óā∑     | Soft Slash               | Matches `Óāī/Óā∂`, softer aesthetics
#   ‚Ēā     |  ‚Ēā     | Pipe Bar                 | Vertical divider
#   ¬¶     |  ¬¶     | Thin Double Bar          | Lightweight alternative
#   ‚ÄĘ     |  ‚ÄĘ     | Bullet Dot               | Subtle and minimal
#   ¬∑     |  ¬∑     | Mid Dot                  | Smaller than bullet
#   ÔĄÜ     |  ÔĄá     | Nerd Font Vert Chevrons  | Vertical chevrons for up/down separation (nf-oct-chevron_*)
#   :     |  :     | Colon Separator          | Clean, ASCII-safe
#   ‚čģ     |  ‚čģ     | Vertical Ellipsis        | Decorative vertical stack
#   ‚łĹ     |  ‚łĹ     | Low Line                 | Unique and rare
#   ‚ü°     |  ‚ü°     | Star Geometry            | Geometric ornament
#   +     |  +     | Plus Symbol              | Simple ASCII fallback
#         |        | None                     | No visual divider (clean interface)
#
#
# VERTICAL/DIRECTIONAL SEPARATORS (Special Use)
# For hierarchical or directional context
#
#  Symbol | Style                    | Notes
# --------|--------------------------|--------------------------------------------------
#   ÔĄÜ     | Up Chevron               | Indicates parent/above context (nf-oct-chevron_up)
#   ÔĄá     | Down Chevron             | Indicates child/below context (nf-oct-chevron_down)
#   ‚ģĀ     | Up Triangle              | Alternative upward pointer
#   ‚ģÉ     | Down Triangle            | Alternative downward pointer
#   ‚ģĆ     | Left Loop Arrow          | Circular/repeat context
#   ‚ģé     | Right Loop Arrow         | Circular/repeat context
#
